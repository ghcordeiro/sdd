name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'   # Dispara em tags como v0.1.0, v1.2.3

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # necessário para provenance (npm --provenance)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build --workspace=packages/cli

      - name: Publish @ghcordeiro/ai-skills
        run: npm publish packages/cli --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
