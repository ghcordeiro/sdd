name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ── 1. Type-check ─────────────────────────────────────────────────────────
  check:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check core
        run: npx tsc -p libs/core/tsconfig.json --noEmit

      - name: Type-check CLI
        run: npx tsc -p packages/cli/tsconfig.json --noEmit

  # ── 2. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: node packages/cli/build.mjs

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: packages/cli/dist/
          retention-days: 1

  # ── 3. Verificar versão ───────────────────────────────────────────────────
  verify-version:
    name: Verify version
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG=$(node -p "require('./packages/cli/package.json').version")
          EXPECTED="v${PKG}"

          echo "Tag:     $TAG"
          echo "Package: $PKG  (esperado: $EXPECTED)"

          if [ "$TAG" != "$EXPECTED" ]; then
            echo "❌ Tag '$TAG' não bate com a versão do package.json ('$PKG')."
            echo "   Atualize a versão no packages/cli/package.json antes de criar a tag."
            exit 1
          fi
          echo "✓ Versão validada: $PKG"

  # ── 4. Publish → npmjs.com ────────────────────────────────────────────────
  publish:
    name: Publish to npm
    needs: verify-version
    runs-on: ubuntu-latest
    environment: npm                  # usa o environment criado no GitHub
    permissions:
      contents: read
      id-token: write                 # necessário para npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: packages/cli/dist/

      - name: Publish @ghcordeiro/ai-skills
        run: npm publish --access public --provenance
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_SECRET }}    # secret do environment npm
